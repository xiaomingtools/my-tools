<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 工具狂魔小明</title>
<style>
:root {
  --cyan: #00f0ff;
  --purple: #c000ff;
  --pink: #ff0080;
  --bg: #0a0a1a;
  --card: rgba(15,15,40,0.9);
  --text: #d0d0f0;
  --dim: #7070a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
/* 粒子背景 */
#particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
.container { max-width:800px; margin:0 auto; padding:32px 20px; position:relative; z-index:1; }
.header { text-align:center; margin-bottom:32px; }
.header h1 {
  font-size:28px; font-weight:800;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.header p { color:var(--dim); font-size:14px; }

/* 登录 */
.login-box {
  max-width:400px; margin:80px auto;
  background: var(--card);
  border:1px solid rgba(0,240,255,0.2);
  border-radius:16px; padding:40px;
  text-align:center;
}
.login-box h2 { margin-bottom:24px; color:#fff; }
.login-box input {
  width:100%; padding:12px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,240,255,0.3);
  border-radius:8px; color:#fff; font-size:15px;
  margin-bottom:16px; outline:none;
  transition:border-color 0.3s;
}
.login-box input:focus { border-color:var(--cyan); }
.login-box button {
  width:100%; padding:12px;
  background:linear-gradient(135deg, var(--cyan), var(--purple));
  border:none; border-radius:8px; color:#fff;
  font-size:15px; font-weight:600; cursor:pointer;
  transition:opacity 0.3s;
}
.login-box button:hover { opacity:0.9; }
.login-error { color:var(--pink); font-size:13px; margin-top:8px; }

/* 标签切换 */
.tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.tab {
  padding:8px 20px; border-radius:8px; font-size:14px;
  cursor:pointer; border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03); color:var(--dim);
  transition:all 0.3s;
}
.tab.active { border-color:var(--cyan); color:var(--cyan); background:rgba(0,240,255,0.08); }

/* 面板 */
.panel { display:none; }
.panel.active { display:block; }

/* 表单 */
.form-group { margin-bottom:20px; }
.form-group label {
  display:block; font-size:13px; color:var(--cyan); margin-bottom:6px; font-weight:600;
}
.form-group input, .form-group textarea {
  width:100%; padding:10px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:#fff; font-size:14px;
  outline:none; font-family:inherit;
  transition:border-color 0.3s;
}
.form-group input:focus, .form-group textarea:focus { border-color:var(--cyan); }
.form-group textarea { min-height:80px; resize:vertical; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }

/* 条目卡片 */
.item-card {
  background:var(--card); border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; padding:16px 20px; margin-bottom:12px;
  display:flex; align-items:flex-start; gap:12px;
  transition:all 0.3s;
}
.item-card:hover { border-color:var(--cyan); }
.item-info { flex:1; }
.item-title { font-size:15px; font-weight:600; color:#fff; margin-bottom:4px; }
.item-desc { font-size:13px; color:var(--dim); }
.item-tags { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.item-tag {
  font-size:11px; color:var(--cyan); border:1px solid rgba(0,240,255,0.3);
  border-radius:4px; padding:1px 6px;
}
.item-actions { display:flex; gap:8px; flex-direction:column; }
.btn {
  padding:6px 14px; border-radius:6px; font-size:12px;
  cursor:pointer; border:none; font-weight:600;
  transition:all 0.3s;
}
.btn-edit { background:rgba(0,240,255,0.15); color:var(--cyan); }
.btn-edit:hover { background:rgba(0,240,255,0.25); }
.btn-del { background:rgba(255,0,128,0.15); color:var(--pink); }
.btn-del:hover { background:rgba(255,0,128,0.25); }
.btn-add {
  padding:10px 24px; background:linear-gradient(135deg, var(--cyan), var(--purple));
  color:#fff; font-size:14px; border-radius:8px; margin-bottom:20px;
}
.btn-save {
  padding:10px 24px; background:linear-gradient(135deg, #00e676, #00c853);
  color:#fff; font-size:14px; border-radius:8px; border:none; cursor:pointer;
}
.btn-cancel {
  padding:10px 24px; background:rgba(255,255,255,0.1);
  color:var(--dim); font-size:14px; border-radius:8px; border:none; cursor:pointer;
}

/* 编辑弹窗 */
.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7); z-index:100;
  display:flex; align-items:center; justify-content:center;
}
.modal {
  background:var(--card); border:1px solid rgba(0,240,255,0.3);
  border-radius:16px; padding:32px; max-width:500px; width:90%;
  max-height:80vh; overflow-y:auto;
}
.modal h3 { margin-bottom:20px; color:#fff; }
.modal-actions { display:flex; gap:12px; margin-top:20px; justify-content:flex-end; }

/* 站点设置 */
.site-form { max-width:500px; }

/* 顶部操作栏 */
.topbar {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:24px;
}
.topbar .user-info { font-size:13px; color:var(--dim); }
.topbar .btn-logout {
  padding:6px 14px; border-radius:6px; font-size:12px;
  background:rgba(255,0,128,0.15); color:var(--pink);
  border:none; cursor:pointer;
}

.status-msg {
  padding:10px 16px; border-radius:8px; font-size:13px; margin-bottom:16px;
}
.status-msg.success { background:rgba(0,230,118,0.15); color:#00e676; border:1px solid rgba(0,230,118,0.3); }
.status-msg.error { background:rgba(255,0,128,0.15); color:var(--pink); border:1px solid rgba(255,0,128,0.3); }

/* 密码修改 */
.password-section {
  background:var(--card); border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; padding:20px; margin-top:32px;
}
.password-section h4 { margin-bottom:16px; color:#fff; }
.password-row { display:flex; gap:12px; align-items:flex-end; }
.password-row .form-group { flex:1; margin-bottom:0; }

@media (max-width:600px) {
  .container { padding:20px 12px; }
  .form-row { flex-direction:column; }
}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="container">
  <!-- 登录界面 -->
  <div id="loginView" class="login-box">
    <h2>后台管理</h2>
    <input type="password" id="passwordInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登录</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- 管理界面 -->
  <div id="adminView" style="display:none">
    <div class="header">
      <h1>工具狂魔小明</h1>
      <p>后台管理系统</p>
    </div>
    <div class="topbar">
      <span class="user-info">已登录</span>
      <button class="btn-logout" onclick="logout()">退出</button>
    </div>
    <div id="statusMsg"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('articles')">精选文章</div>
      <div class="tab" onclick="switchTab('tools')">工具推荐</div>
      <div class="tab" onclick="switchTab('resources')">资源合集</div>
      <div class="tab" onclick="switchTab('site')">站点设置</div>
      <div class="tab" onclick="switchTab('password')">修改密码</div>
    </div>

    <!-- 文章面板 -->
    <div id="panel-articles" class="panel active">
      <button class="btn btn-add" onclick="openModal('article')">添加文章</button>
      <div id="articleList"></div>
    </div>

    <!-- 工具面板 -->
    <div id="panel-tools" class="panel">
      <button class="btn btn-add" onclick="openModal('tool')">添加工具</button>
      <div id="toolList"></div>
    </div>

    <!-- 资源面板 -->
    <div id="panel-resources" class="panel">
      <button class="btn btn-add" onclick="openModal('resource')">添加资源包</button>
      <div id="resourceList"></div>
    </div>

    <!-- 站点设置面板 -->
    <div id="panel-site" class="panel">
      <div class="site-form">
        <div class="form-group">
          <label>站点标题</label>
          <input id="siteTitle" placeholder="工具狂魔小明">
        </div>
        <div class="form-group">
          <label>副标题</label>
          <textarea id="siteSubtitle" placeholder="刷到好玩的工具就想分享出来..."></textarea>
        </div>
        <button class="btn-save" onclick="saveSite()">保存设置</button>
      </div>
    </div>

    <!-- 密码面板 -->
    <div id="panel-password" class="panel">
      <div class="password-section">
        <h4>修改管理密码</h4>
        <div class="password-row">
          <div class="form-group">
            <label>新密码</label>
            <input type="password" id="newPassword" placeholder="输入新密码">
          </div>
          <button class="btn-save" onclick="changePassword()">修改</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div id="modalOverlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modalContent"></div>
</div>

<script>
var API = 'https://xiaoming-api.xiaoming-tools.workers.dev';
var token = '';
var currentTab = 'articles';
var data = { articles:[], tools:[], resources:[], site:{} };

// 粒子背景
(function(){
  var c = document.getElementById('particleCanvas'), ctx = c.getContext('2d');
  var ps=[], w,h;
  function rs(){ w=c.width=window.innerWidth; h=c.height=window.innerHeight; }
  rs(); window.addEventListener('resize',rs);
  for(var i=0;i<50;i++) ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.5+0.5});
  function dr(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<ps.length;i++){
      var p=ps[i]; p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,240,255,0.4)';ctx.fill();
      for(var j=i+1;j<ps.length;j++){
        var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(0,240,255,'+(0.1*(1-dist/100))+')';ctx.lineWidth=0.5;ctx.stroke();}
      }
    }
    requestAnimationFrame(dr);
  }
  dr();
})();

function showStatus(msg, type){
  var el = document.getElementById('statusMsg');
  el.innerHTML = '<div class="status-msg '+type+'">'+msg+'</div>';
  setTimeout(function(){ el.innerHTML=''; }, 3000);
}

async function login(){
  var pw = document.getElementById('passwordInput').value;
  if(!pw) return;
  try {
    var r = await fetch(API+'/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    var j = await r.json();
    if(r.ok){
      token = j.token;
      document.getElementById('loginView').style.display='none';
      document.getElementById('adminView').style.display='block';
      await loadAll();
    } else {
      document.getElementById('loginError').textContent = '密码错误';
    }
  } catch(e){
    document.getElementById('loginError').textContent = '连接失败，请检查网络';
  }
}

function logout(){
  token=''; data={articles:[],tools:[],resources:[],site:{}};
  document.getElementById('loginView').style.display='block';
  document.getElementById('adminView').style.display='none';
}

async function loadAll(){
  try {
    var r = await fetch(API+'/api/all');
    data = await r.json();
    renderAll();
    // 填充站点设置
    document.getElementById('siteTitle').value = data.site.title || '';
    document.getElementById('siteSubtitle').value = data.site.subtitle || '';
  } catch(e){ showStatus('加载数据失败','error'); }
}

function renderAll(){
  renderList('articleList', data.articles||[], 'article');
  renderList('toolList', data.tools||[], 'tool');
  renderList('resourceList', data.resources||[], 'resource');
}

function renderList(listId, items, type){
  var el = document.getElementById(listId);
  if(items.length===0){
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim);">暂无内容，点击上方按钮添加</div>';
    return;
  }
  var h = '';
  items.forEach(function(item, idx){
    if(type==='article'){
      h += '<div class="item-card"><div class="item-info"><div class="item-title">'+esc(item.title)+'</div><div class="item-desc">'+esc(item.date)+'</div></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal(\'article\','+idx+')">编辑</button><button class="btn btn-del" onclick="delItem(\'articles\','+idx+')">删除</button></div></div>';
    } else if(type==='tool'){
      var tags='';
      (item.tags||[]).forEach(function(t){ tags+='<span class="item-tag">'+esc(t)+'</span>'; });
      h += '<div class="item-card"><div class="item-info"><div class="item-title">'+esc(item.icon)+' '+esc(item.name)+'</div><div class="item-desc">'+esc(item.desc)+'</div><div class="item-tags">'+tags+'</div></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal(\'tool\','+idx+')">编辑</button><button class="btn btn-del" onclick="delItem(\'tools\','+idx+')">删除</button></div></div>';
    } else if(type==='resource'){
      h += '<div class="item-card"><div class="item-info"><div class="item-title">'+esc(item.icon)+' '+esc(item.name)+'</div><div class="item-desc">'+esc(item.desc)+'</div></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal(\'resource\','+idx+')">编辑</button><button class="btn btn-del" onclick="delItem(\'resources\','+idx+')">删除</button></div></div>';
    }
  });
  el.innerHTML = h;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('panel-'+tab).classList.add('active');
}

async function delItem(type, idx){
  if(!confirm('确认删除？')) return;
  data[type].splice(idx,1);
  await saveData(type);
}

async function saveData(type){
  try {
    var r = await fetch(API+'/api/'+type, {
      method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify(data[type])
    });
    if(r.ok){ showStatus('保存成功','success'); renderAll(); }
    else { showStatus('保存失败','error'); }
  } catch(e){ showStatus('网络错误','error'); }
}

async function saveSite(){
  data.site.title = document.getElementById('siteTitle').value;
  data.site.subtitle = document.getElementById('siteSubtitle').value;
  try {
    var r = await fetch(API+'/api/site', {
      method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify(data.site)
    });
    if(r.ok) showStatus('站点设置已保存','success');
    else showStatus('保存失败','error');
  } catch(e){ showStatus('网络错误','error'); }
}

async function changePassword(){
  var pw = document.getElementById('newPassword').value;
  if(!pw){ showStatus('请输入新密码','error'); return; }
  try {
    var r = await fetch(API+'/api/password', {
      method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({password:pw})
    });
    if(r.ok){ showStatus('密码已修改','success'); document.getElementById('newPassword').value=''; token=pw; }
    else showStatus('修改失败','error');
  } catch(e){ showStatus('网络错误','error'); }
}

function openModal(type, idx){
  var isEdit = idx !== undefined;
  var item = isEdit ? data[type+'s'][idx] : {};
  var title = isEdit ? '编辑' : '添加';
  if(type==='article') title += '文章';
  else if(type==='tool') title += '工具';
  else title += '资源包';

  var h = '<h3>'+title+'</h3>';
  if(type==='article'){
    h += '<div class="form-group"><label>文章标题</label><input id="mTitle" value="'+esc(item.title||'')+'"></div>';
    h += '<div class="form-group"><label>文章链接</label><input id="mUrl" value="'+esc(item.url||'')+'"></div>';
    h += '<div class="form-group"><label>日期</label><input id="mDate" value="'+esc(item.date||'')+'" placeholder="2025-07-10"></div>';
  } else if(type==='tool'){
    h += '<div class="form-group"><label>图标 Emoji</label><input id="mIcon" value="'+esc(item.icon||'')+'" placeholder="🤖"></div>';
    h += '<div class="form-group"><label>工具名称</label><input id="mName" value="'+esc(item.name||'')+'"></div>';
    h += '<div class="form-group"><label>描述</label><textarea id="mDesc">'+esc(item.desc||'')+'</textarea></div>';
    h += '<div class="form-group"><label>链接</label><input id="mUrl" value="'+esc(item.url||'')+'"></div>';
    h += '<div class="form-group"><label>标签（逗号分隔）</label><input id="mTags" value="'+esc((item.tags||[]).join(','))+'"></div>';
  } else if(type==='resource'){
    h += '<div class="form-group"><label>图标 Emoji</label><input id="mIcon" value="'+esc(item.icon||'')+'" placeholder="📦"></div>';
    h += '<div class="form-group"><label>资源包名称</label><input id="mName" value="'+esc(item.name||'')+'"></div>';
    h += '<div class="form-group"><label>描述</label><textarea id="mDesc">'+esc(item.desc||'')+'</textarea></div>';
    h += '<div class="form-group"><label>网盘链接</label><input id="mUrl" value="'+esc(item.url||'')+'"></div>';
  }
  h += '<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveModal(\''+type+'\','+idx+')">保存</button></div>';

  document.getElementById('modalContent').innerHTML = h;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal(){
  document.getElementById('modalOverlay').style.display = 'none';
}

function saveModal(type, idx){
  var item = {};
  if(type==='article'){
    item.title = document.getElementById('mTitle').value;
    item.url = document.getElementById('mUrl').value;
    item.date = document.getElementById('mDate').value;
  } else if(type==='tool'){
    item.icon = document.getElementById('mIcon').value;
    item.name = document.getElementById('mName').value;
    item.desc = document.getElementById('mDesc').value;
    item.url = document.getElementById('mUrl').value;
    item.tags = document.getElementById('mTags').value.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  } else if(type==='resource'){
    item.icon = document.getElementById('mIcon').value;
    item.name = document.getElementById('mName').value;
    item.desc = document.getElementById('mDesc').value;
    item.url = document.getElementById('mUrl').value;
  }
  var key = type+'s';
  if(idx===undefined){
    data[key].push(item);
  } else {
    data[key][idx] = item;
  }
  closeModal();
  saveData(key);
}
</script>
</body>
</html>
