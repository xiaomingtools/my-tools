<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<style>
:root {
  --cyan: #00f0ff; --purple: #c000ff; --pink: #ff0080; --bg: #06060f;
  --card-bg: rgba(10, 10, 30, 0.7); --text: #d0d0f0; --text-dim: #7070a0;
  --input-bg: rgba(255,255,255,0.05); --danger: #ff4466;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.neon-orb { position:fixed; border-radius:50%; filter:blur(90px); opacity:0.25; z-index:0; pointer-events:none; }
.neon-orb.o1 { width:400px; height:400px; background:var(--cyan); top:-100px; right:-80px; }
.neon-orb.o2 { width:350px; height:350px; background:var(--purple); bottom:-80px; left:-100px; }
.wrap { max-width:720px; margin:0 auto; padding:32px 20px 60px; position:relative; z-index:1; }
.login-box { max-width:360px; margin:80px auto; background:var(--card-bg); border:1px solid rgba(0,240,255,0.2); border-radius:16px; padding:36px 28px; backdrop-filter:blur(12px); text-align:center; }
.login-box h1 { font-size:22px; color:#fff; margin-bottom:8px; text-shadow:0 0 12px var(--cyan); }
.login-box p { font-size:13px; color:var(--text-dim); margin-bottom:24px; }
.login-box input { width:100%; background:var(--input-bg); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:12px 14px; color:#fff; font-size:14px; margin-bottom:14px; outline:none; transition:border-color 0.3s; }
.login-box input:focus { border-color:var(--cyan); }
.login-box button { width:100%; }
h1.title { font-size:24px; color:#fff; text-align:center; margin-bottom:6px; text-shadow:0 0 14px var(--cyan); }
.subtitle-bar { text-align:center; font-size:13px; color:var(--text-dim); margin-bottom:28px; }
.section { background:var(--card-bg); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:22px 20px; margin-bottom:20px; backdrop-filter:blur(12px); }
.section h2 { font-size:16px; color:#fff; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
.field input, .field textarea { width:100%; background:var(--input-bg); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px; color:#fff; font-size:14px; outline:none; transition:border-color 0.3s; font-family:inherit; }
.field input:focus, .field textarea:focus { border-color:var(--cyan); }
.field textarea { resize:vertical; min-height:64px; }
.row { display:flex; gap:12px; }
.row .field { flex:1; }
.btn { display:inline-block; background:linear-gradient(135deg,var(--cyan),#00c8e0); color:#000; border:none; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.3s; box-shadow:0 0 14px rgba(0,240,255,0.25); font-family:inherit; }
.btn:hover { box-shadow:0 0 24px rgba(0,240,255,0.5); transform:translateY(-1px); }
.btn.purple { background:linear-gradient(135deg,var(--purple),#9a00d0); color:#fff; box-shadow:0 0 14px rgba(192,0,255,0.25); }
.btn.purple:hover { box-shadow:0 0 24px rgba(192,0,255,0.5); }
.btn.ghost { background:transparent; color:var(--text); border:1px solid rgba(255,255,255,0.15); box-shadow:none; }
.btn.ghost:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 12px rgba(0,240,255,0.2); }
.btn.danger { background:transparent; color:var(--danger); border:1px solid rgba(255,68,102,0.3); box-shadow:none; padding:6px 12px; font-size:12px; }
.btn.danger:hover { background:rgba(255,68,102,0.1); border-color:var(--danger); }
.btn.small { padding:6px 14px; font-size:12px; }
.toolbar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:24px; }
.tabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.tab { padding:8px 18px; border-radius:8px; font-size:13px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:var(--input-bg); color:var(--text-dim); transition:all 0.3s; }
.tab.active { color:#fff; border-color:var(--cyan); background:rgba(0,240,255,0.1); box-shadow:0 0 12px rgba(0,240,255,0.2); }
.item-list { }
.item-card { background:var(--input-bg); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
.item-card .ic-icon { font-size:22px; }
.item-card .ic-info { flex:1; min-width:0; }
.item-card .ic-name { font-size:14px; color:#fff; font-weight:500; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-card .ic-desc { font-size:12px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-card .ic-actions { display:flex; gap:6px; flex-shrink:0; }
.empty { text-align:center; padding:24px; color:var(--text-dim); font-size:13px; border:1px dashed rgba(255,255,255,0.1); border-radius:10px; }
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:rgba(0,240,255,0.15); border:1px solid var(--cyan); color:var(--cyan); padding:10px 24px; border-radius:8px; font-size:13px; z-index:9999; transition:transform 0.4s; backdrop-filter:blur(8px); }
.toast.show { transform:translateX(-50%) translateY(0); }
.edit-form { background:rgba(0,240,255,0.04); border:1px solid rgba(0,240,255,0.2); border-radius:10px; padding:16px; margin-bottom:14px; }
.edit-form .form-title { font-size:13px; color:var(--cyan); margin-bottom:12px; font-weight:600; }
.form-actions { display:flex; gap:8px; margin-top:4px; }
.tag-input-wrap { display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:var(--input-bg); border:1px solid rgba(255,255,255,0.1); border-radius:8px; min-height:42px; }
.tag-chip { background:rgba(0,240,255,0.12); border:1px solid rgba(0,240,255,0.3); color:var(--cyan); border-radius:5px; padding:3px 10px; font-size:12px; display:flex; align-items:center; gap:4px; }
.tag-chip span { cursor:pointer; }
.tag-input { background:transparent; border:none; color:#fff; font-size:13px; outline:none; flex:1; min-width:80px; }
.footer-note { text-align:center; font-size:12px; color:#505080; margin-top:30px; line-height:1.7; }
@media (max-width:520px){ .row{ flex-direction:column; gap:0; } .wrap{ padding:24px 14px 48px; } }
</style>
</head>
<body>
<div class="neon-orb o1"></div>
<div class="neon-orb o2"></div>
<div class="wrap" id="app" style="display:none;">
  <h1 class="title">管理后台</h1>
  <p class="subtitle-bar">在这里增删改内容，保存后前台自动更新</p>

  <div class="toolbar">
    <a href="index.html" class="btn ghost" target="_blank">预览前台</a>
    <button class="btn ghost" onclick="exportData()">导出 data.json</button>
    <button class="btn ghost" onclick="document.getElementById('importFile').click()">导入 data.json</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn danger" onclick="resetData()">重置为默认</button>
    <button class="btn danger" onclick="logout()">退出</button>
  </div>

  <div class="section">
    <h2>⚙️ 站点设置</h2>
    <div class="field"><label>站点标题</label><input id="setTitle" placeholder="我的工具站"></div>
    <div class="field"><label>副标题 / 一句话简介</label><textarea id="setSubtitle" placeholder="好工具，随手分享"></textarea></div>
    <div class="field"><label>头像图标（填一个 emoji，如 🛠️ 🤖 ⚡）</label><input id="setAvatar" placeholder="🛠️" maxlength="4"></div>
    <button class="btn" onclick="saveSite()">保存站点设置</button>
  </div>

  <div class="section">
    <h2>📚 内容管理</h2>
    <div class="tabs">
      <div class="tab active" data-tab="articles" onclick="switchTab('articles')">📝 精选文章</div>
      <div class="tab" data-tab="tools" onclick="switchTab('tools')">⚡ 工具推荐</div>
      <div class="tab" data-tab="resources" onclick="switchTab('resources')">📦 资源合集</div>
    </div>
    <div id="editForm"></div>
    <div id="itemList" class="item-list"></div>
  </div>

  <p class="footer-note">提示：所有改动自动保存在浏览器本地。<br>部署到线上时，点「导出 data.json」下载文件替换即可。</p>
</div>

<div class="wrap" id="login">
  <div class="login-box">
    <h1>管理后台</h1>
    <p>请输入管理密码</p>
    <input type="password" id="pwdInput" placeholder="密码（默认 admin123）" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">进入后台</button>
    <p style="margin-top:18px;font-size:11px;color:#505080;">默认密码 admin123，可在 admin.html 代码里修改</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var ADMIN_PWD = "hang1991";
var DEFAULT_DATA = {
  "site": { "title": "我的工具站", "subtitle": "好工具，随手分享。AI 神器、效率软件、资源合集，都在这里。", "avatar": "🛠️" },
  "articles": [], "tools": [], "resources": []
};
var data = null;
var currentTab = "articles";
var editingIndex = -1;

function loadData(){
  try { var s = localStorage.getItem("siteData"); if(s) return JSON.parse(s); } catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData(){ localStorage.setItem("siteData", JSON.stringify(data)); }
function toast(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(function(){ t.classList.remove("show"); },2000); }

function doLogin(){
  var pwd = document.getElementById("pwdInput").value;
  if(pwd === ADMIN_PWD){
    sessionStorage.setItem("adminOk","1");
    showApp();
  } else { toast("密码错误"); }
}
function logout(){ sessionStorage.removeItem("adminOk"); location.reload(); }
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  data = loadData();
  document.getElementById("setTitle").value = data.site.title;
  document.getElementById("setSubtitle").value = data.site.subtitle;
  document.getElementById("setAvatar").value = data.site.avatar || "";
  switchTab(currentTab);
}
if(sessionStorage.getItem("adminOk")==="1"){ showApp(); }

function saveSite(){
  data.site.title = document.getElementById("setTitle").value || "我的工具站";
  data.site.subtitle = document.getElementById("setSubtitle").value || "";
  data.site.avatar = document.getElementById("setAvatar").value || "🛠️";
  saveData(); toast("站点设置已保存");
}

function switchTab(tab){
  currentTab = tab; editingIndex = -1;
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.toggle("active", t.dataset.tab===tab); });
  renderForm(); renderList();
}

function renderForm(){
  var box = document.getElementById("editForm");
  if(currentTab==="articles"){
    box.innerHTML = '<div class="edit-form"><div class="form-title">添加文章</div>'+
      '<div class="field"><label>标题</label><input id="f_title" placeholder="文章标题"></div>'+
      '<div class="row"><div class="field"><label>链接</label><input id="f_url" placeholder="https://..."></div>'+
      '<div class="field"><label>日期</label><input id="f_date" type="date"></div></div>'+
      '<div class="form-actions"><button class="btn small" onclick="saveItem()">添加</button></div></div>';
  } else if(currentTab==="tools"){
    box.innerHTML = '<div class="edit-form"><div class="form-title">添加工具</div>'+
      '<div class="row"><div class="field" style="max-width:80px;"><label>图标</label><input id="f_icon" placeholder="🤖" maxlength="4"></div>'+
      '<div class="field"><label>名称</label><input id="f_name" placeholder="工具名"></div></div>'+
      '<div class="field"><label>描述</label><textarea id="f_desc" placeholder="一句话描述"></textarea></div>'+
      '<div class="field"><label>链接</label><input id="f_url" placeholder="https://..."></div>'+
      '<div class="field"><label>标签（回车添加）</label><div class="tag-input-wrap" id="tagWrap"><input class="tag-input" id="tagInput" placeholder="输入标签后回车"></div></div>'+
      '<div class="form-actions"><button class="btn small" onclick="saveItem()">添加</button></div></div>';
    setupTagInput();
  } else {
    box.innerHTML = '<div class="edit-form"><div class="form-title">添加资源</div>'+
      '<div class="row"><div class="field" style="max-width:80px;"><label>图标</label><input id="f_icon" placeholder="📦" maxlength="4"></div>'+
      '<div class="field"><label>名称</label><input id="f_name" placeholder="资源包名"></div></div>'+
      '<div class="field"><label>描述</label><textarea id="f_desc" placeholder="里面有什么，适合谁用"></textarea></div>'+
      '<div class="field"><label>链接</label><input id="f_url" placeholder="网盘链接"></div>'+
      '<div class="form-actions"><button class="btn small" onclick="saveItem()">添加</button></div></div>';
  }
}

var currentTags = [];
function setupTagInput(){
  currentTags = [];
  var input = document.getElementById("tagInput");
  input.addEventListener("keydown", function(e){
    if(e.key==="Enter"){ e.preventDefault(); var v=input.value.trim(); if(v && currentTags.indexOf(v)<0){ currentTags.push(v); renderTags(); } input.value=""; }
  });
}
function renderTags(){
  var wrap = document.getElementById("tagWrap");
  var chips = currentTags.map(function(t,i){ return '<span class="tag-chip">'+t+'<span onclick="removeTag('+i+')">×</span></span>'; }).join("");
  wrap.innerHTML = chips + '<input class="tag-input" id="tagInput" placeholder="输入标签后回车">';
  var input = document.getElementById("tagInput");
  input.addEventListener("keydown", function(e){
    if(e.key==="Enter"){ e.preventDefault(); var v=input.value.trim(); if(v && currentTags.indexOf(v)<0){ currentTags.push(v); renderTags(); } input.value=""; }
  });
  input.focus();
}
function removeTag(i){ currentTags.splice(i,1); renderTags(); }

function saveItem(){
  var isEdit = editingIndex >= 0;
  if(currentTab==="articles"){
    var title=document.getElementById("f_title").value.trim();
    var url=document.getElementById("f_url").value.trim();
    var date=document.getElementById("f_date").value;
    if(!title){ toast("请填标题"); return; }
    if(!data.articles) data.articles=[];
    var obj={title:title,url:url,date:date};
    if(isEdit) data.articles[editingIndex]=obj; else data.articles.unshift(obj);
  } else if(currentTab==="tools"){
    var name=document.getElementById("f_name").value.trim();
    if(!name){ toast("请填名称"); return; }
    if(!data.tools) data.tools=[];
    var obj={icon:document.getElementById("f_icon").value.trim()||"🔧",name:name,desc:document.getElementById("f_desc").value.trim(),url:document.getElementById("f_url").value.trim(),tags:currentTags.slice()};
    if(isEdit) data.tools[editingIndex]=obj; else data.tools.unshift(obj);
  } else {
    var rname=document.getElementById("f_name").value.trim();
    if(!rname){ toast("请填名称"); return; }
    if(!data.resources) data.resources=[];
    var obj={icon:document.getElementById("f_icon").value.trim()||"📦",name:rname,desc:document.getElementById("f_desc").value.trim(),url:document.getElementById("f_url").value.trim()};
    if(isEdit) data.resources[editingIndex]=obj; else data.resources.unshift(obj);
  }
  saveData(); toast(isEdit?"已修改":"已添加"); editingIndex=-1; renderForm(); renderList();
}
function editItem(i){
  editingIndex = i;
  var item = data[currentTab][i];
  renderForm();
  if(currentTab==="articles"){
    document.getElementById("f_title").value=item.title||"";
    document.getElementById("f_url").value=item.url||"";
    document.getElementById("f_date").value=item.date||"";
  } else if(currentTab==="tools"){
    document.getElementById("f_icon").value=item.icon||"";
    document.getElementById("f_name").value=item.name||"";
    document.getElementById("f_desc").value=item.desc||"";
    document.getElementById("f_url").value=item.url||"";
    currentTags=(item.tags||[]).slice();
    renderTags();
  } else {
    document.getElementById("f_icon").value=item.icon||"";
    document.getElementById("f_name").value=item.name||"";
    document.getElementById("f_desc").value=item.desc||"";
    document.getElementById("f_url").value=item.url||"";
  }
  var btn=document.querySelector(".form-actions button");
  if(btn) btn.textContent="保存修改";
  var ft=document.querySelector(".form-title");
  if(ft) ft.textContent="编辑内容（第 "+(i+1)+" 条）";
  document.getElementById("editForm").scrollIntoView({behavior:"smooth"});
}

function renderList(){
  var box = document.getElementById("itemList");
  var list = data[currentTab] || [];
  if(list.length===0){ box.innerHTML = '<div class="empty">还没有内容，用上方表单添加吧</div>'; return; }
  var html = "";
  list.forEach(function(item,i){
    var name="", desc="";
    if(currentTab==="articles"){ name=item.title; desc=item.date; }
    else if(currentTab==="tools"){ name=(item.icon||"")+" "+item.name; desc=item.desc; }
    else { name=(item.icon||"")+" "+item.name; desc=item.desc; }
    html += '<div class="item-card"><div class="ic-info"><div class="ic-name">'+esc(name)+'</div><div class="ic-desc">'+esc(desc)+'</div></div><div class="ic-actions"><button class="btn small" onclick="editItem('+i+')">编辑</button><button class="btn danger" onclick="delItem('+i+')">删除</button></div></div>';
  });
  box.innerHTML = html;
}
function delItem(i){ if(!confirm("确定删除？")) return; data[currentTab].splice(i,1); saveData(); renderList(); toast("已删除"); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function exportData(){
  var blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="data.json"; a.click();
  toast("已导出 data.json");
}
function importData(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){ try{ data=JSON.parse(ev.target.result); saveData(); showApp(); toast("导入成功"); }catch(err){ toast("文件格式错误"); } };
  reader.readAsText(file);
  e.target.value="";
}
function resetData(){ if(!confirm("确定重置为默认数据？所有内容会清空")) return; data=JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData(); showApp(); toast("已重置"); }
</script>
</body>
</html>
