<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面走丢了 - 工具狂魔小明</title>
<link rel="icon" href="favicon.png">
<style>
:root { --cyan:#00f0ff; --purple:#c000ff; --pink:#ff0080; --bg:#06060f; --text:#d0d0f0; --dim:#7575a8; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.neon-orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.35; z-index:0; pointer-events:none; }
.neon-orb.o1 { width:400px; height:400px; background:var(--cyan); top:-100px; left:-80px; }
.neon-orb.o2 { width:350px; height:350px; background:var(--purple); bottom:-100px; right:-100px; }
.wrap { position:relative; z-index:1; text-align:center; padding:24px; }
.code { font-size:120px; font-weight:800; letter-spacing:6px; color:#fff; text-shadow:0 0 20px var(--cyan),0 0 50px var(--cyan); line-height:1; }
.code .glitch { color:var(--pink); text-shadow:0 0 20px var(--pink),0 0 50px var(--pink); }
.msg { font-size:16px; color:var(--dim); margin:18px 0 32px; line-height:1.7; }
.btn { display:inline-block; font-size:14px; font-weight:600; color:#000; background:linear-gradient(135deg,var(--cyan),#00c8e0); text-decoration:none; border-radius:10px; padding:12px 32px; box-shadow:0 0 20px rgba(0,240,255,0.35); transition:all .3s; }
.btn:hover { box-shadow:0 0 34px rgba(0,240,255,0.55); transform:translateY(-2px); }
.scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px); pointer-events:none; z-index:2; }
</style>
</head>
<body>
<div class="neon-orb o1"></div>
<div class="neon-orb o2"></div>
<div class="scanlines"></div>
<div class="wrap">
  <div class="code">4<span class="glitch">0</span>4</div>
  <p class="msg">这个页面跑丢了，可能还没发布，或者链接错了。<br>回主页看看最新的好工具吧。</p>
  <a href="index.html" class="btn">返回主页 →</a>
</div>
</body>
</html>
